{{- $headHost := .Values.global.headHost -}}
{{- $adminHost := .Values.global.adminHost | default $headHost -}}
{{- $apiHost := .Values.global.apiHost | default $headHost -}}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: crczp-ingress
  labels: {{- include "common.labels" (dict "name" .Chart.Name "chart" .Chart "release" .Release "extraLabels" .Values.extraLabels) | nindent 4 }}
spec:
  entryPoints:
    - web
    - websecure
  routes:
    {{- range $key, $value := .Values.global.services }}
    {{- if $value.ingressAutoexpose  }}
    {{- $routeHost := $apiHost -}}
    {{- if eq $key "angularFrontend" -}}
    {{- $routeHost = $adminHost -}}
    {{- end }}
    - kind: Rule
      {{- if mustRegexMatch "^((25[0-5]|(2[0-4]|1\\d|[1-9]|)\\d)\\.){3}(25[0-5]|(2[0-4]|1\\d|[1-9]|)\\d)$" $routeHost }}
      match: PathPrefix(`{{ $value.contextPath }}`)
      {{- else }}
      match: Host(`{{ $routeHost }}`) && PathPrefix(`{{ $value.contextPath }}`)
      {{- end }}
      services:
        - kind: Service
          name: {{ $value.name }}
          port: {{ $value.port }}
    {{- end }}
    {{- end }}
    - kind: Rule
      {{- if mustRegexMatch "^((25[0-5]|(2[0-4]|1\\d|[1-9]|)\\d)\\.){3}(25[0-5]|(2[0-4]|1\\d|[1-9]|)\\d)$" $apiHost }}
      match: PathPrefix(`{{ .Values.global.services.userAndGroup.contextPath }}microservices`) && (Method(`GET`) || Method(`PUT`) || Method(`DELETE`) || Method(`PATCH`) || Method(`HEAD`))
      {{- else }}
      match: Host(`{{ $apiHost }}`) && PathPrefix(`{{ .Values.global.services.userAndGroup.contextPath }}microservices`) && (Method(`GET`) || Method(`PUT`) || Method(`DELETE`) || Method(`PATCH`) || Method(`HEAD`))
      {{- end }}
      services:
        - kind: Service
          name: uag-service
          port: 8084
    - kind: Rule
      {{- if mustRegexMatch "^((25[0-5]|(2[0-4]|1\\d|[1-9]|)\\d)\\.){3}(25[0-5]|(2[0-4]|1\\d|[1-9]|)\\d)$" $apiHost }}
      match: PathPrefix(`{{ .Values.global.services.userAndGroup.contextPath }}`) && ! PathPrefix(`{{ .Values.global.services.userAndGroup.contextPath }}microservices`)
      {{- else }}
      match: Host(`{{ $apiHost }}`) && PathPrefix(`{{ .Values.global.services.userAndGroup.contextPath }}`) && ! PathPrefix(`{{ .Values.global.services.userAndGroup.contextPath }}microservices`)
      {{- end }}
      services:
        - kind: Service
          name: uag-service
          port: 8084
  tls:
    secretName: {{ .Values.global.tlsSecretName }}
    domains:
    - main: {{ $adminHost }}
      {{- if ne $apiHost $adminHost }}
      sans:
      - {{ $apiHost }}
      {{- end }}
