
{{- define "common.deployment.header" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .name }}
  annotations:
    reloader.stakater.com/auto: "true"
  labels: {{- include "common.labels" . | nindent 4 }}
spec:
  {{- $autoscaling := .autoscaling | default dict }}
  {{- if not $autoscaling.enabled }}
  replicas: {{ .replicasCount }}
  {{- end }}
  selector:
    matchLabels: {{- include "common.matchLabels" . | nindent 6 }}
  {{- if .strategy }}
  strategy:
    type: {{ .strategy }}
  {{- end }}
  template:
    metadata:
      labels: {{- include "common.labels" . | nindent 8 }}
    spec:
      {{- if .serviceAccountName }}
      serviceAccountName: {{ .serviceAccountName }}
      {{- end }}
{{- end }}

{{- define "common.hpa" -}}
{{- $autoscaling := .Values.autoscaling | default dict -}}
{{- if $autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .name }}
  labels: {{- include "common.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .name }}
  minReplicas: {{ $autoscaling.minReplicas | default 1 }}
  maxReplicas: {{ $autoscaling.maxReplicas | default 3 }}
  metrics:
    {{- if $autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if $autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ $autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
    {{- if not (or $autoscaling.targetCPUUtilizationPercentage $autoscaling.targetMemoryUtilizationPercentage) }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    {{- end }}
  {{- with $autoscaling.behavior }}
  behavior:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}

{{- define "common.deployment.containers" }}
      containers:
        - name: {{ .name }}
          image: "{{ .Values.image.url }}:{{ .Values.image.tag }}"
          {{- if .Values.image.pullPolicy }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- end }}
          {{- if .command }}
          command: ["{{ .command }}"]
          {{- end }}
          {{- if .args }}
          args: {{ .args }}
          {{- end }}
          {{- if or .Values.environments .Values.secretEnvironments }}
          env:
            {{- range $key, $value := .Values.environments }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- range $key, $value := .Values.secretEnvironments }}
            - name: {{ $key }}
              valueFrom:
                secretKeyRef:
                  name: {{ $value.secretName }}
                  key: {{ $value.secretKey }}
            {{- end }}
          {{- end }}
          {{- if not .portsDisabled }}
          ports:
            {{- range .ports }}
            - containerPort: {{ .port }}
            {{- end }}
          readinessProbe:
            {{- range .ports }}
            {{- if and (eq .protocol "TCP") (.probe) }}
            tcpSocket:
              port: {{ .port }}
            initialDelaySeconds: 180
            periodSeconds: 10
            {{- end }}
            {{- end }}
          {{- end }}
          {{- $resources := .Values.resources }}
          {{- if .resources }}
          {{- $resources = .resources }}
          {{- end }}
          {{- with $resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- range $key, $mount := .Values.mounts }}
            - name: {{ $key | replace "_" "-" }}
              mountPath: "{{ $mount.mountPath }}{{ if $mount.isOneFile }}{{ if $mount.subPath }}{{ $key }}{{ $mount.extension }}{{ end }}{{ end }}"
              {{- if $mount.subPath }}
              subPath: "{{ $key }}{{ $mount.extension }}"
              {{- end }}
            {{- end }}
{{- end }}

{{- define "common.deployment.volumes" }}
      volumes:
        {{- range $key, $mount := .Values.mounts }}
        - name: {{ $key | replace "_" "-" }}
          {{- toYaml $mount.type | nindent 10 }}
            {{- if $mount.isOneFile }}
            items:
              {{- if $mount.items }}
              {{- range $mount.items }}
              - key: "{{ .name }}{{ .extension }}"
                path: "{{ .name }}{{ .extension }}"
                {{- if .mode }}
                mode: {{ .mode }}
                {{- end }}
              {{- end }}
              {{- else }}
              - key: "{{ $key }}{{ $mount.extension }}"
                path: "{{ $key }}{{ $mount.extension }}"
                {{- if $mount.mode }}
                mode: {{ $mount.mode }}
                {{- end }}
              {{- end }}
            {{- end }}
        {{- end }}
{{- end }}
