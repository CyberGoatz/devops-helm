replicasCount: 1

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 70

image:
  url: cybergoatz.azurecr.io/sandbox-service
  tag: v0.1.19

resources:
  requests:
    cpu: 100m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 2Gi

workerResources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

environments:
  SERVICE_PRECONDITION: "uag-service:8084"
  DJANGO_ADMIN_USER: crczp-admin
  DJANGO_ADMIN_PASSWORD:
  DJANGO_ADMIN_EMAIL: crczp-admin@example.com
  GUNICORN_WORKERS: "3"

mounts:
  config:
    extension: .yml
    mountPath: /app/
    isOneFile: true
    subPath: true
    type:
      secret:
        secretName: sandbox-service-secret
  tls:
    extension: .crt
    mountPath: /usr/local/share/ca-certificates/
    isOneFile: true
    subPath: true
    type:
      secret:
        secretName: crczp-certs
  proxy-key:
    extension: ""
    mountPath: /root/.ssh/
    isOneFile: true
    subPath: true
    mode: '0600'
    type:
      secret:
        secretName: proxy-key
  ansible-runner-vol:
    extension: ""
    mountPath: /var/opt/crczp/ansible-runner-volumes
    isOneFile: false
    type:
      persistentVolumeClaim:
        claimName: sandbox-service

pvc:
  enabled: true
  size: 1Gi
  storageClassName: local-path
  accessMode: ReadWriteOnce
  storageClass:
    create: false
    provisioner: file.csi.azure.com
    reclaimPolicy: Delete
    volumeBindingMode: Immediate
    allowVolumeExpansion: true
    parameters:
      skuName: Premium_LRS
    mountOptions: []

stackNamePrefix: default0
dnsNameServers:
  - 1.1.1.1
  - 1.0.0.1
syslogDestinationPort: 515
osAuthUrl:
osApplicationCredentialId:
osApplicationCredentialSecret:
osConsoleType: spice-html5
openstackWorkerCount: 2
ansibleWorkerCount: 2
defaultWorkerCount: 1
idleCleanup:
  enabled: true
  schedule: "*/15 * * * *"
  idleMinutes: 60
  replace: true
serviceAccountClients:
  - training-service
sandboxBuildTimeout: 7200
sandboxDeleteTimeout: 3600
sandboxAnsibleTimeout: 7200
manFlavor: Standard_B2ats_v2
manImage: Canonical:0001-com-ubuntu-server-jammy:22_04-lts-gen2:latest
manUser: ubuntu
sandboxManCidr:
proxyHost:
proxyUser:
proxyKey:
proxyPort:
ansibleDockerNetwork: host
djangoSecretKey:
flavorMapping: {}

smtpServer:
smtpPort: 25
senderEmail: "sandbox.service@crczp.cz"
senderEmailPassword:
smtpEncryption:

redis:
  defaultCacheTimeout: 86400
  uagCacheTimeout: 86400
  topologyCacheTimeout: 86400

database:
  connMaxAge: 0
  connHealthChecks: true

runnerCleanup:
  enabled: false
  schedule: "30 2 * * *"
  retentionDays: 7
  image:
    url: busybox
    tag: 1.36

ansibleRunner:
  image:
    url: cybergoatz.azurecr.io/cybergoatz-ansible-runner
    tag: v1.1.1

gitConfig:
  providers: {}
  #providers: {"https://github.com/": "TOKEN"}
  user: git
  ansibleNetworkingUrl: https://github.com/cyberrangecz/ansible-stage-one.git
  ansibleNetworkingRev: v2.0.3

aws:
  accessKeyId:
  secretAccessKey:
  region: eu-central-1
  availabilityZone: eu-central-1a
  baseVpc: BaseNet
  baseSubnet: BaseSubnetA

azure:
  subscriptionId:
  tenantId:
  clientId:
  clientSecret:
  resourceGroupName:
  location:
  nativeRouting: true
  omitRouterVms: true

keystoneCA:
