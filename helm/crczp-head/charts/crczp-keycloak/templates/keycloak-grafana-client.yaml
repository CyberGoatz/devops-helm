{{- $grafanaHost := .Values.global.adminHost | default .Values.global.headHost -}}
apiVersion: legacy.k8s.keycloak.org/v1alpha1
kind: KeycloakClient
metadata:
  name: grafana-client
  labels:
    app: external-sso
spec:
  realmSelector:
    matchLabels:
      app: external-sso
  client:
    attributes:
      pkce.code.challenge.method: S256
      post.logout.redirect.uris: "https://{{ $grafanaHost }}/logout-confirmed"
    clientId: Grafana-Client
    clientAuthenticatorType: client-secret
    defaultClientScopes:
      - email
      - profile
      - openid
    directAccessGrantsEnabled: false
    implicitFlowEnabled: false
    name: "Grafana-Client"
    optionalClientScopes:
      - offline_access
    protocol: openid-connect
    publicClient: false
    redirectUris:
      - "https://{{ $grafanaHost }}/grafana"
      - "https://{{ $grafanaHost }}/grafana/login/generic_oauth"
    {{- if .Values.grafanaClientSecret }}
    secret: {{ .Values.grafanaClientSecret }}
    {{- end }}
    standardFlowEnabled: true
