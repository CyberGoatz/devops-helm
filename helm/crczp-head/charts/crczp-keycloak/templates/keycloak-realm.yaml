apiVersion: legacy.k8s.keycloak.org/v1alpha1
kind: KeycloakRealm
metadata:
  name: keycloakrealm
  labels:
    app: external-sso
spec:
  instanceSelector:
    matchLabels:
      app: external-sso
  realm:
    registrationAllowed: {{ .Values.realmConfig.registrationAllowed }}
    registrationEmailAsUsername: {{ .Values.realmConfig.registrationEmailAsUsername }}
    rememberMe: {{ .Values.realmConfig.rememberMe }}
    verifyEmail: {{ .Values.realmConfig.verifyEmail }}
    resetPasswordAllowed: {{ .Values.realmConfig.resetPasswordAllowed }}
    ssoSessionIdleTimeout: {{ .Values.realmConfig.sessions.ssoSessionIdleTimeout }}
    ssoSessionMaxLifespan: {{ .Values.realmConfig.sessions.ssoSessionMaxLifespan }}
    clientSessionIdleTimeout: {{ .Values.realmConfig.sessions.clientSessionIdleTimeout }}
    clientSessionMaxLifespan: {{ .Values.realmConfig.sessions.clientSessionMaxLifespan }}
    accessTokenLifespan: {{ .Values.realmConfig.sessions.accessTokenLifespan }}
    {{- if .Values.theme.enabled }}
    loginTheme: {{ .Values.theme.name | quote }}
    {{- end }}
    {{- if .Values.realmConfig.passwordPolicy }}
    passwordPolicy: {{ .Values.realmConfig.passwordPolicy | quote }}
    {{- end }}
    {{- if .Values.realmConfig.smtp.enabled }}
    smtpServer:
      host: {{ .Values.realmConfig.smtp.host | quote }}
      port: {{ .Values.realmConfig.smtp.port | toString | quote }}
      from: {{ .Values.realmConfig.smtp.from | quote }}
      {{- if .Values.realmConfig.smtp.fromDisplayName }}
      fromDisplayName: {{ .Values.realmConfig.smtp.fromDisplayName | quote }}
      {{- end }}
      {{- if .Values.realmConfig.smtp.replyTo }}
      replyTo: {{ .Values.realmConfig.smtp.replyTo | quote }}
      {{- end }}
      {{- if .Values.realmConfig.smtp.replyToDisplayName }}
      replyToDisplayName: {{ .Values.realmConfig.smtp.replyToDisplayName | quote }}
      {{- end }}
      {{- if .Values.realmConfig.smtp.envelopeFrom }}
      envelopeFrom: {{ .Values.realmConfig.smtp.envelopeFrom | quote }}
      {{- end }}
      ssl: {{ .Values.realmConfig.smtp.ssl | toString | quote }}
      starttls: {{ .Values.realmConfig.smtp.starttls | toString | quote }}
      auth: {{ .Values.realmConfig.smtp.auth | toString | quote }}
      user: {{ .Values.realmConfig.smtp.user | quote }}
      password: {{ .Values.realmConfig.smtp.password | quote }}
    {{- end }}
    clientScopes:
      - name: email
        attributes:
          consent.screen.text: "${emailScopeConsentText}"
          display.on.consent.screen: "true"
          include.in.token.scope: "true"
        description: "OpenID Connect built-in scope: email"
        protocol: openid-connect
        protocolMappers:
          - name: email
            protocol: openid-connect
            protocolMapper: oidc-usermodel-attribute-mapper
            config:
              access.token.claim: "true"
              aggregate.attrs: "false"
              claim.name: "email"
              id.token.claim: "true"
              jsonType.label: "String"
              multivalued: "false"
              user.attribute: "email"
              userinfo.token.claim: "true"
          - name: "email verified"
            protocol: "openid-connect"
            protocolMapper: "oidc-usermodel-property-mapper"
            config:
              access.token.claim: "true"
              claim.name: "email_verified"
              id.token.claim: "true"
              jsonType.label: "boolean"
              user.attribute: "emailVerified"
              userinfo.token.claim: "true"
      - name: "offline_access"
        attributes:
          consent.screen.text: "${offlineAccessScopeConsentText}"
          display.on.consent.screen: "true"
          include.in.token.scope: "true"
        description: "OpenID Connect built-in scope: offline_access"
        protocol: "openid-connect"
      - name: openid
        protocol: openid-connect
        protocolMappers:
          - name: sub
            protocol: openid-connect
            protocolMapper: oidc-usermodel-property-mapper
            config:
              user.attribute: email
              claim.name: sub
              jsonType.label: String
              id.token.claim: 'true'
              access.token.claim: 'true'
              userinfo.token.claim: 'true'
      - name: roles
        attributes:
          include.in.token.scope: "false"
        description: "OpenID Connect scope for realm and client role claims"
        protocol: openid-connect
        protocolMappers:
          - name: client roles
            protocol: openid-connect
            protocolMapper: oidc-usermodel-client-role-mapper
            consentRequired: false
            config:
              access.token.claim: "true"
              claim.name: resource_access.${client_id}.roles
              introspection.token.claim: "true"
              jsonType.label: String
              multivalued: "true"
              user.attribute: foo
          - name: audience resolve
            protocol: openid-connect
            protocolMapper: oidc-audience-resolve-mapper
            consentRequired: false
            config:
              access.token.claim: "true"
              introspection.token.claim: "true"
          - name: realm roles
            protocol: openid-connect
            protocolMapper: oidc-usermodel-realm-role-mapper
            consentRequired: false
            config:
              access.token.claim: "true"
              claim.name: realm_access.roles
              introspection.token.claim: "true"
              jsonType.label: String
              multivalued: "true"
              user.attribute: foo
      - name: "profile"
        attributes:
          consent.screen.text: "${profileScopeConsentText}"
          display.on.consent.screen: "true"
          include.in.token.scope: "true"
        description: "OpenID Connect built-in scope: profile"
        protocol: "openid-connect"
        protocolMappers:
          - name: username
            protocol: openid-connect
            protocolMapper: oidc-usermodel-attribute-mapper
            consentRequired: false
            config:
              userinfo.token.claim: 'true'
              user.attribute: username
              id.token.claim: 'true'
              access.token.claim: 'true'
              claim.name: preferred_username
              jsonType.label: String
          - name: given name
            protocol: openid-connect
            protocolMapper: oidc-usermodel-attribute-mapper
            consentRequired: false
            config:
              userinfo.token.claim: 'true'
              user.attribute: firstName
              id.token.claim: 'true'
              access.token.claim: 'true'
              claim.name: given_name
              jsonType.label: String
          - name: full name
            protocol: openid-connect
            protocolMapper: oidc-full-name-mapper
            consentRequired: false
            config:
              id.token.claim: 'true'
              access.token.claim: 'true'
              userinfo.token.claim: 'true'
          - name: updated at
            protocol: openid-connect
            protocolMapper: oidc-usermodel-attribute-mapper
            consentRequired: false
            config:
              userinfo.token.claim: 'true'
              user.attribute: updatedAt
              id.token.claim: 'true'
              access.token.claim: 'true'
              claim.name: updated_at
              jsonType.label: long
          - name: picture
            protocol: openid-connect
            protocolMapper: oidc-usermodel-attribute-mapper
            consentRequired: false
            config:
              userinfo.token.claim: 'true'
              user.attribute: picture
              id.token.claim: 'true'
              access.token.claim: 'true'
              claim.name: picture
              jsonType.label: String
          - name: family name
            protocol: openid-connect
            protocolMapper: oidc-usermodel-attribute-mapper
            consentRequired: false
            config:
              userinfo.token.claim: 'true'
              user.attribute: lastName
              id.token.claim: 'true'
              access.token.claim: 'true'
              claim.name: family_name
              jsonType.label: String
          - name: zoneinfo
            protocol: openid-connect
            protocolMapper: oidc-usermodel-attribute-mapper
            consentRequired: false
            config:
              userinfo.token.claim: 'true'
              user.attribute: zoneinfo
              id.token.claim: 'true'
              access.token.claim: 'true'
              claim.name: zoneinfo
              jsonType.label: String
          - name: birthdate
            protocol: openid-connect
            protocolMapper: oidc-usermodel-attribute-mapper
            consentRequired: false
            config:
              userinfo.token.claim: 'true'
              user.attribute: birthdate
              id.token.claim: 'true'
              access.token.claim: 'true'
              claim.name: birthdate
              jsonType.label: String
          - name: locale
            protocol: openid-connect
            protocolMapper: oidc-usermodel-attribute-mapper
            consentRequired: false
            config:
              userinfo.token.claim: 'true'
              user.attribute: locale
              id.token.claim: 'true'
              access.token.claim: 'true'
              claim.name: locale
              jsonType.label: String
          - name: website
            protocol: openid-connect
            protocolMapper: oidc-usermodel-attribute-mapper
            consentRequired: false
            config:
              userinfo.token.claim: 'true'
              user.attribute: website
              id.token.claim: 'true'
              access.token.claim: 'true'
              claim.name: website
              jsonType.label: String
          - name: gender
            protocol: openid-connect
            protocolMapper: oidc-usermodel-attribute-mapper
            consentRequired: false
            config:
              userinfo.token.claim: 'true'
              user.attribute: gender
              id.token.claim: 'true'
              access.token.claim: 'true'
              claim.name: gender
              jsonType.label: String
          - name: middle name
            protocol: openid-connect
            protocolMapper: oidc-usermodel-attribute-mapper
            consentRequired: false
            config:
              userinfo.token.claim: 'true'
              user.attribute: middleName
              id.token.claim: 'true'
              access.token.claim: 'true'
              claim.name: middle_name
              jsonType.label: String
          - name: nickname
            protocol: openid-connect
            protocolMapper: oidc-usermodel-attribute-mapper
            consentRequired: false
            config:
              userinfo.token.claim: 'true'
              user.attribute: nickname
              id.token.claim: 'true'
              access.token.claim: 'true'
              claim.name: nickname
              jsonType.label: String
          - name: profile
            protocol: openid-connect
            protocolMapper: oidc-usermodel-attribute-mapper
            consentRequired: false
            config:
              userinfo.token.claim: 'true'
              user.attribute: profile
              id.token.claim: 'true'
              access.token.claim: 'true'
              claim.name: profile
              jsonType.label: String
    id: "{{ .Values.realm }}"
    realm: "{{ .Values.realm }}"
    enabled: True
    displayName: "{{ .Values.realm }} Realm"
