apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.name }}-initial-admin
  annotations:
    "helm.sh/hook": "pre-install"
    "helm.sh/hook-delete-policy": "before-hook-creation"
    "helm.sh/hook-weight": "-5"
data:
  username: {{ .Values.keycloakAdmin | b64enc }}
  password: {{ .Values.keycloakPassword | b64enc }}
type: kubernetes.io/basic-auth
---
apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: {{ .Values.name }}
  labels: {{- include "common.labels" (dict "name" .Values.name "chart" $.Chart "release" $.Release "extraLabels" $.extraLabels) | nindent 4 }}
spec:
  instances: 1
  db:
    vendor: postgres
    host: {{ $.Values.global.postgres.serviceName }}
    port: {{ $.Values.global.postgres.port }}
    database: {{ .Values.db.database }}
    usernameSecret:
      name: {{ .Values.name }}-secrets
      key: username
    passwordSecret:
      name: {{ .Values.name }}-secrets
      key: password
  features:
    enabled:
      - hostname:v1
  http:
    httpEnabled: true
    httpPort: 8080
  ingress:
    enabled: false
  hostname:
    hostname: {{ $.Values.global.headHost }}
  additionalOptions:
    - name: proxy
      value: edge
    - name: hostname-path
      value: /keycloak
    - name: http-relative-path
      value: /keycloak
    {{- if and .Values.theme.enabled .Values.theme.disableCache }}
    - name: spi-theme--cache-themes
      value: "false"
    - name: spi-theme--cache-templates
      value: "false"
    - name: spi-theme--static-max-age
      value: "-1"
    {{- end }}
  {{- if .Values.theme.enabled }}
  unsupported:
    podTemplate:
      spec:
        {{- if .Values.theme.writableDevMount }}
        initContainers:
          - name: copy-{{ .Values.theme.name }}-theme
            image: {{ .Values.realmSync.image }}
            imagePullPolicy: {{ .Values.realmSync.imagePullPolicy }}
            command:
              - /bin/sh
              - -ec
              - |
                rm -rf /theme-work/{{ .Values.theme.name }}/*
                cp -R /theme-source/. /theme-work/{{ .Values.theme.name }}/
            volumeMounts:
              - name: {{ .Values.theme.name }}-theme-source
                mountPath: /theme-source
                readOnly: true
              - name: {{ .Values.theme.name }}-theme-work
                mountPath: /theme-work/{{ .Values.theme.name }}
        {{- end }}
        containers:
          - name: keycloak
            volumeMounts:
              {{- if .Values.theme.writableDevMount }}
              - name: {{ .Values.theme.name }}-theme-work
                mountPath: /opt/keycloak/themes/{{ .Values.theme.name }}
              {{- else }}
              - name: {{ .Values.theme.name }}-theme
                mountPath: /opt/keycloak/themes/{{ .Values.theme.name }}
                readOnly: true
              {{- end }}
        volumes:
          {{- if .Values.theme.writableDevMount }}
          - name: {{ .Values.theme.name }}-theme-work
            emptyDir: {}
          - name: {{ .Values.theme.name }}-theme-source
            configMap:
              name: {{ .Values.name }}-theme-{{ .Values.theme.name }}
              items:
                - key: theme.properties
                  path: login/theme.properties
                {{ range $path, $_ := .Files.Glob (printf "files/keycloak-theme/%s/login/*.ftl" .Values.theme.name) }}
                - key: {{ base $path }}
                  path: login/{{ base $path }}
                {{ end }}
                - key: cyber-goatz.css
                  path: login/resources/css/cyber-goatz.css
          {{- else }}
          - name: {{ .Values.theme.name }}-theme
            configMap:
              name: {{ .Values.name }}-theme-{{ .Values.theme.name }}
              items:
                - key: theme.properties
                  path: login/theme.properties
                {{ range $path, $_ := .Files.Glob (printf "files/keycloak-theme/%s/login/*.ftl" .Values.theme.name) }}
                - key: {{ base $path }}
                  path: login/{{ base $path }}
                {{ end }}
                - key: cyber-goatz.css
                  path: login/resources/css/cyber-goatz.css
          {{- end }}
  {{- end }}
