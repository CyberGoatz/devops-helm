{{- $adminFrontendUrls := list -}}
{{- if .Values.adminFrontendUrls -}}
{{- range .Values.adminFrontendUrls -}}
{{- $adminFrontendUrls = append $adminFrontendUrls (trimSuffix "/" .) -}}
{{- end -}}
{{- else -}}
{{- $adminFrontendUrls = append $adminFrontendUrls (printf "https://%s" ($.Values.global.adminHost | default $.Values.global.headHost)) -}}
{{- end -}}
{{- $adminClientId := .Values.adminClient.clientId | default "cybergoatz-admin" -}}
apiVersion: legacy.k8s.keycloak.org/v1alpha1
kind: KeycloakClient
metadata:
  name: cybergoatz-admin
  labels:
    app: external-sso
spec:
  realmSelector:
    matchLabels:
      app: external-sso
  client:
    attributes:
      pkce.code.challenge.method: S256
      post.logout.redirect.uris: +
    clientId: {{ $adminClientId | quote }}
    clientAuthenticatorType: client-secret
    defaultClientScopes:
      - email
      - profile
      - openid
    directAccessGrantsEnabled: true
    {{- if .Values.development }}
    implicitFlowEnabled: true
    {{- else }}
    implicitFlowEnabled: false
    {{- end }}
    name: "CyberGoatz Portal"
    optionalClientScopes:
      - offline_access
    protocol: openid-connect
    publicClient: true
    redirectUris:
      {{- range $frontendUrl := $adminFrontendUrls }}
      - "{{ $frontendUrl }}"
      - "{{ $frontendUrl }}/"
      - "{{ $frontendUrl }}/*"
      - "{{ $frontendUrl }}/login"
      - "{{ $frontendUrl }}/index.html"
      - "{{ $frontendUrl }}/silent-refresh.html"
      {{- end }}
    standardFlowEnabled: true
    webOrigins:
      {{- range $frontendUrl := $adminFrontendUrls }}
      - "{{ $frontendUrl }}"
      {{- end }}
