{{- $users := $.Values.global.users }}
{{- $bootstrapUsers := default dict .Values.bootstrapUsers }}
{{- $reconcilePasswords := get $bootstrapUsers "reconcilePasswords" | default false }}
{{- if (lookup "v1" "Secret" "crczp" "generated-users") }}
{{- $users = concat $.Values.global.users ((lookup "v1" "Secret" "crczp" "generated-users").data.generatedUsers | b64dec | fromYamlArray) }}
{{- end }}
{{- range $users }}
{{- if .keycloakUsername }}
---
apiVersion: legacy.k8s.keycloak.org/v1alpha1
kind: KeycloakUser
metadata:
  name: {{ .keycloakUsername | replace "@" "-" }}
  labels:
    app: external-sso
spec:
  realmSelector:
    matchLabels:
      app: external-sso
  user:
    username: {{ .keycloakUsername }}
    firstName: {{ .givenName }}
    lastName: {{ .familyName }}
    email: {{ .email }}
    enabled: True
    emailVerified: {{ .emailVerified }}
    {{- if and .keycloakPassword (or $.Release.IsInstall $reconcilePasswords) }}
    credentials:
      - type: "password"
        value: {{ .keycloakPassword }}
    {{- end }}
    realmRoles:
      - offline_access
{{- end }}
{{- end }}
