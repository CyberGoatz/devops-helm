{{- if .Values.theme.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.name }}-theme-{{ .Values.theme.name }}
  labels: {{- include "common.labels" (dict "name" (printf "%s-theme" .Values.name) "chart" $.Chart "release" $.Release "extraLabels" $.extraLabels) | nindent 4 }}
data:
  theme.properties: |-
{{ .Files.Get (printf "files/keycloak-theme/%s/login/theme.properties" .Values.theme.name) | indent 4 }}
{{ range $path, $_ := .Files.Glob (printf "files/keycloak-theme/%s/login/*.ftl" .Values.theme.name) }}
  {{ base $path }}: |-
{{ $.Files.Get $path | indent 4 }}
{{ end }}
  cyber-goatz.css: |-
{{ .Files.Get (printf "files/keycloak-theme/%s/login/resources/css/cyber-goatz.css" .Values.theme.name) | indent 4 }}
  email-theme.properties: |-
{{ .Files.Get (printf "files/keycloak-theme/%s/email/theme.properties" .Values.theme.name) | indent 4 }}
{{ range $path, $_ := .Files.Glob (printf "files/keycloak-theme/%s/email/messages/*.properties" .Values.theme.name) }}
  email-messages-{{ base $path }}: |-
{{ $.Files.Get $path | indent 4 }}
{{ end }}
{{ range $path, $_ := .Files.Glob (printf "files/keycloak-theme/%s/email/html/*.ftl" .Values.theme.name) }}
  email-html-{{ base $path }}: |-
{{ $.Files.Get $path | indent 4 }}
{{ end }}
{{ range $path, $_ := .Files.Glob (printf "files/keycloak-theme/%s/email/text/*.ftl" .Values.theme.name) }}
  email-text-{{ base $path }}: |-
{{ $.Files.Get $path | indent 4 }}
{{ end }}
{{- end }}
