{{- $cyberGoatzFrontendUrl := trimSuffix "/" (.Values.cyberGoatzFrontendUrl | default "http://localhost:3000") -}}
apiVersion: legacy.k8s.keycloak.org/v1alpha1
kind: KeycloakClient
metadata:
  name: cyber-goatz-client
  labels:
    app: external-sso
spec:
  realmSelector:
    matchLabels:
      app: external-sso
  client:
    attributes:
      pkce.code.challenge.method: S256
      post.logout.redirect.uris: "{{ $cyberGoatzFrontendUrl }}/login"
    clientId: cyber-goatz
    clientAuthenticatorType: client-secret
    defaultClientScopes:
      - email
      - profile
      - openid
    directAccessGrantsEnabled: false
    implicitFlowEnabled: false
    name: "CyberGoatz"
    optionalClientScopes:
      - offline_access
    protocol: openid-connect
    publicClient: false
    redirectUris:
      - "{{ $cyberGoatzFrontendUrl }}/api/auth/callback/keycloak"
      - "{{ $cyberGoatzFrontendUrl }}/api/auth/callback/keycloak-register"
    secret: "cyber-goatz-client"
    standardFlowEnabled: true