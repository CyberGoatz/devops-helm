name: keycloak

db:
  database: keycloak
  username: keycloak
  pool:
    initialSize: 5
    minSize: 5
    maxSize: 5

grafanaClientSecret:
# List of frontend origins that are allowed to use the CyberGoatz OIDC client.
# Keep localhost here when testing a local Next.js frontend against a deployed backend.
cyberGoatzFrontendUrls:
  - http://localhost:3000

# Deprecated: use cyberGoatzFrontendUrls for multiple deployed/local frontend origins.
cyberGoatzFrontendUrl: http://localhost:3000

keycloakAdmin: admin
keycloakPassword:
realmSync:
  enabled: true
  image: quay.io/keycloak/keycloak:25.0.1
  imagePullPolicy: IfNotPresent

development: false

trainingServiceClient:
  clientId: training-service
  clientSecret: training-service-secret

inviteServiceClient:
  clientId: cybergoatz-invite-service
  clientSecret: cybergoatz-invite-service-secret

realm: cybergoatz

theme:
  enabled: true
  name: cyber-goatz
  disableCache: true
  writableDevMount: true

realmConfig:
  registrationAllowed: true
  registrationEmailAsUsername: false
  rememberMe: true
  verifyEmail: false
  resetPasswordAllowed: true
  sessions:
    ssoSessionIdleTimeout: 3600
    ssoSessionMaxLifespan: 28800
    clientSessionIdleTimeout: 3600
    clientSessionMaxLifespan: 28800
    accessTokenLifespan: 300
  termsAndConditions:
    enabled: true
  passwordPolicy:
  smtp:
    enabled: false
    host:
    port: 587
    from:
    fromDisplayName:
    replyTo:
    replyToDisplayName:
    envelopeFrom:
    ssl: false
    starttls: true
    auth: true
    user:
    password:
  googleIdentityProvider:
    enabled: false
    alias: google
    displayName: Google
    trustEmail: true
    storeToken: false
    addReadTokenRoleOnCreate: false
    firstBrokerLoginFlowAlias: first broker login
    clientId:
    clientSecret:
    hostedDomain:
