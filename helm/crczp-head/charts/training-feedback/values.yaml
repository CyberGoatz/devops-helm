replicasCount: 1

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

image:
  url: cybergoatz.azurecr.io/training-feedback-service
  tag: v1.2.1

resources:
  requests:
    cpu: 75m
    memory: 384Mi
  limits:
    cpu: 750m
    memory: 768Mi

mounts:
  training-feedback:
    extension: .properties
    mountPath: /app/etc/
    isOneFile: true
    subPath: false
    type:
      configMap:
        name: training-feedback-service-configmap
  tls:
    extension: .crt
    mountPath: /srv/
    isOneFile: true
    subPath: false
    type:
      secret:
        secretName: crczp-certs

databasePool:
  maximumPoolSize: 3
  minimumIdle: 1
  connectionTimeout: 10000
  idleTimeout: 600000
  maxLifetime: 1800000
  leakDetectionThreshold: 0
