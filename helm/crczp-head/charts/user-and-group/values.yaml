replicasCount: 1

image:
  url: cybergoatz.azurecr.io/user-and-group-service
  tag: v1.0.0

mounts:
  configs:
    mountPath: /app/etc/
    isOneFile: true
    subPath: false
    type:
      configMap:
        name: uag-service-configmap
    items:
      - name: user-and-group
        extension: .properties
      - name: initial-users
        extension: .yml
      - name: exported-local-oidc-users
        extension: .yml
  tls:
    extension: .crt
    mountPath: /srv/
    isOneFile: true
    subPath: false
    type:
      secret:
        secretName: crczp-certs

connectionTimeout:
maximumPoolSize:
databasePool:
  maximumPoolSize: 5
  minimumIdle: 1
  connectionTimeout: 10000
  idleTimeout: 600000
  maxLifetime: 1800000
  leakDetectionThreshold: 0
