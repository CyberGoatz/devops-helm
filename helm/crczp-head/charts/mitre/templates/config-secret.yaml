apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.global.services.mitre.name }}-secret
  labels: {{- include "common.labels" (dict "name" .Values.global.services.mitre.name "chart" .Chart "release" .Release "extraLabels" .Values.extraLabels) | nindent 4 }}
type: Opaque
stringData:
  django-secret-key: {{ required "mitre.djangoSecretKey is required" .Values.djangoSecretKey | quote }}
