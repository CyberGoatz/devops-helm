{{- $service := .Values.global.services.cybergoatz -}}
{{- $database := .Values.global.postgresServices.cybergoatz -}}
{{- $oidcProvider := first .Values.global.oidcProviders -}}
{{- $inviteServiceClientId := dig "serviceAccounts" "invite" "clientId" .Values.keycloak.adminClientId .Values.global -}}
{{- $inviteServiceClientSecret := dig "serviceAccounts" "invite" "clientSecret" .Values.keycloak.adminClientSecret .Values.global -}}
{{- $globalPrefix := trimAll "/" $service.contextPath -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $service.name }}
  annotations:
    reloader.stakater.com/auto: "true"
  labels: {{- include "common.labels" (dict "name" $service.name "chart" .Chart "release" .Release "extraLabels" .Values.extraLabels) | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicasCount }}
  {{- end }}
  selector:
    matchLabels: {{- include "common.matchLabels" (dict "name" $service.name "release" .Release) | nindent 6 }}
  template:
    metadata:
      labels: {{- include "common.labels" (dict "name" $service.name "chart" .Chart "release" .Release "extraLabels" .Values.extraLabels) | nindent 8 }}
    spec:
      containers:
        - name: {{ $service.name }}
          image: "{{ .Values.image.url }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ $service.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ $service.port | quote }}
            - name: APP_GLOBAL_PREFIX
              value: {{ $globalPrefix | quote }}
            - name: DB_HOST
              value: {{ include "common.postgres.appHost" . | quote }}
            - name: DB_PORT
              value: {{ include "common.postgres.appPort" . | quote }}
            - name: DB_USERNAME
              value: {{ $database.dbUser | quote }}
            - name: DB_PASSWORD
              value: {{ $database.dbPassword | quote }}
            - name: DB_DATABASE
              value: {{ $database.dbName | quote }}
            - name: DB_SYNCHRONIZE
              value: {{ .Values.database.synchronize | quote }}
            - name: DB_POOL_MAX
              value: {{ .Values.databasePool.maximumPoolSize | quote }}
            - name: DB_CONNECTION_TIMEOUT_MS
              value: {{ .Values.databasePool.connectionTimeoutMs | quote }}
            - name: DB_IDLE_TIMEOUT_MS
              value: {{ .Values.databasePool.idleTimeoutMs | quote }}
            - name: OIDC_ISSUER_URL
              value: {{ ($oidcProvider.issuerIdentifier | default $oidcProvider.url) | quote }}
            - name: KEYCLOAK_ADMIN_BASE_URL
              value: {{ .Values.keycloak.adminBaseUrl | quote }}
            - name: KEYCLOAK_REALM
              value: {{ (.Values.keycloak.realm | default .Values.global.keycloakRealm) | quote }}
            - name: KEYCLOAK_ADMIN_CLIENT_ID
              value: {{ $inviteServiceClientId | quote }}
            - name: KEYCLOAK_ADMIN_CLIENT_SECRET
              value: {{ $inviteServiceClientSecret | quote }}
            - name: KEYCLOAK_INVITE_CLIENT_ID
              value: {{ .Values.keycloak.inviteClientId | quote }}
            - name: KEYCLOAK_INVITE_REDIRECT_URI
              value: {{ .Values.keycloak.inviteRedirectUri | quote }}
            - name: KEYCLOAK_INVITE_LIFESPAN_SECONDS
              value: {{ .Values.keycloak.inviteLifespanSeconds | quote }}
            - name: USER_AND_GROUP_API_URL
              value: "http://{{ .Values.global.services.userAndGroup.name }}:{{ .Values.global.services.userAndGroup.port }}{{ .Values.global.services.userAndGroup.contextPath }}"
            - name: UAG_APPROVED_GROUP_NAME
              value: {{ .Values.uag.approvedGroupName | quote }}
            - name: TRAINING_API_URL
              value: "http://{{ .Values.global.services.training.name }}:{{ .Values.global.services.training.port }}{{ .Values.global.services.training.contextPath }}"
            - name: TRAINING_PUBLIC_API_TIMEOUT_MS
              value: {{ .Values.publicTraining.timeoutMs | quote }}
            - name: RATE_LIMIT_REDIS_URL
              value: "redis://{{ .Values.global.redis.serviceName }}:{{ .Values.global.redis.port }}/{{ .Values.global.redis.db }}"
            - name: RATE_LIMIT_REDIS_FAIL_OPEN
              value: {{ .Values.rateLimit.redisFailOpen | quote }}
            - name: RATE_LIMIT_PUBLIC_PROFILE_LIMIT
              value: {{ .Values.rateLimit.publicProfileLimit | quote }}
            - name: RATE_LIMIT_PUBLIC_PROFILE_TTL_SECONDS
              value: {{ .Values.rateLimit.publicProfileTtlSeconds | quote }}
            - name: APP_TRUST_PROXY_HOPS
              value: {{ .Values.rateLimit.trustProxyHops | quote }}
            - name: HTB_API_URL
              value: {{ .Values.htb.apiUrl | quote }}
            - name: HTB_PROFILE_BASE_URL
              value: {{ .Values.htb.profileBaseUrl | quote }}
            - name: HTB_API_TIMEOUT_MS
              value: {{ .Values.htb.timeoutMs | quote }}
            - name: HTB_TOKEN_ENCRYPTION_KEY
              value: {{ .Values.htb.tokenEncryptionKey | quote }}
            - name: CORS_ORIGIN
              {{- if .Values.global.corsWhitelist }}
              value: "{{- range $index, $origin := .Values.global.corsWhitelist -}}{{ if $index }},{{ end }}{{ $origin }}{{- end }}"
              {{- else }}
              value: "https://{{ .Values.global.headHost }}"
              {{- end }}
          readinessProbe:
            httpGet:
              path: "/{{ $globalPrefix }}/health"
              port: {{ $service.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: "/{{ $globalPrefix }}/health"
              port: {{ $service.port }}
            initialDelaySeconds: 30
            periodSeconds: 20
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- if .Values.global.imageCredentials.username }}
      imagePullSecrets:
        - name: github-auth-secret
      {{- end }}
{{- include "common.hpa" (dict "name" $service.name "Values" .Values "chart" .Chart "release" .Release "extraLabels" .Values.extraLabels) }}
