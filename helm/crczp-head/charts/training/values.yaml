replicasCount: 1

image:
  url: cybergoatz.azurecr.io/training-service
  tag: v1.2.3

environments:
  SERVICE_PRECONDITION: uag-service:8084
secretEnvironments:
  TRAINING_SANDBOX_SERVICE_ACCOUNT_CLIENT_SECRET:
    secretName: training-service-service-account
    secretKey: client-secret

mounts:
  training:
    extension: .properties
    mountPath: /app/etc/
    isOneFile: true
    subPath: false
    type:
      configMap:
        name: training-service-configmap
  tls:
    extension: .crt
    mountPath: /srv/
    isOneFile: true
    subPath: false
    type:
      secret:
        secretName: crczp-certs

connectionTimeout:
maximumPoolSize:

sandboxExpiration:
  enabled: true
  scanDelayMs: 60000
  initialDelayMs: 60000

sandboxServiceAccount:
  tokenUri: http://keycloak-service:8080/keycloak/realms/CRCZP/protocol/openid-connect/token
  clientId: training-service
  clientSecret: training-service-secret
