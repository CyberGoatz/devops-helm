replicasCount: 1

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

ticketEncryptionKey: change-me-generate-32-byte-secret

image:
  url: acrcybergoatzprod.azurecr.io/guacamole-service
  tag: v1.0.5
  pullPolicy: Always

resources:
  requests:
    cpu: 75m
    memory: 256Mi
  limits:
    cpu: 750m
    memory: 768Mi

mounts:
  guacamole-service:
    extension: .properties
    mountPath: /app/etc/
    isOneFile: true
    subPath: false
    type:
      configMap:
        name: guacamole-service-configmap
  tls:
    extension: .crt
    mountPath: /srv/
    isOneFile: true
    subPath: false
    type:
      secret:
        secretName: crczp-certs

connectionTimeout:
maximumPoolSize:
databasePool:
  maximumPoolSize: 3
  minimumIdle: 1
  connectionTimeout: 10000
  idleTimeout: 600000
  maxLifetime: 1800000
  leakDetectionThreshold: 0

secretEnvironments:
  GUACAMOLE_TICKET_ENCRYPTION_KEY:
    secretName: guacamole-service-secrets
    secretKey: ticket-encryption-key
