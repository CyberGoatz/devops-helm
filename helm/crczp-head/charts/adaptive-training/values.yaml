replicasCount: 1

image:
  url: cybergoatz.azurecr.io/adaptive-training-service
  tag: v1.2.2

environments:
  SERVICE_PRECONDITION: uag-service:8084

mounts:
  adaptive-training:
    extension: .properties
    mountPath: /app/etc/
    isOneFile: true
    subPath: false
    type:
      configMap:
        name: adaptive-training-service-configmap
  tls:
    extension: .crt
    mountPath: /srv/
    isOneFile: true
    subPath: false
    type:
      secret:
        secretName: crczp-certs

connectionTimeout:
maximumPoolSize:
