replicasCount: 1

image:
  url: cybergoatz.azurecr.io/adaptive-training-service
  tag: v1.2.2

resources:
  requests:
    cpu: 100m
    memory: 384Mi
  limits:
    cpu: "1"
    memory: 768Mi

environments:
  SERVICE_PRECONDITION: uag-service:8084

mounts:
  adaptive-training:
    extension: .properties
    mountPath: /app/etc/
    isOneFile: true
    subPath: false
    type:
      configMap:
        name: adaptive-training-service-configmap
  tls:
    extension: .crt
    mountPath: /srv/
    isOneFile: true
    subPath: false
    type:
      secret:
        secretName: crczp-certs

connectionTimeout:
maximumPoolSize:
databasePool:
  maximumPoolSize: 3
  minimumIdle: 1
  connectionTimeout: 10000
  idleTimeout: 600000
  maxLifetime: 1800000
  leakDetectionThreshold: 0
