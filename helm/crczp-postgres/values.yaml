cluster:
  name: postgres
  instances: 2
  imageName: acrcybergoatzprod.azurecr.io/postgresql:18.4-system-trixie
  storageSize: 32Gi
  storageClass: managed-csi
  enablePDB: true
  minSyncReplicas: 0
  maxSyncReplicas: 0
  superuserSecret: cnpg-superuser
  superuserPassword: password
  affinity:
    nodeSelector:
      kubernetes.azure.com/agentpool: user
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname
    podAntiAffinityType: required
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
  parameters:

backup:
  enabled: false
  destinationPath: ""
  storageAccountName: ""
  containerName: ""
  path: postgres
  retentionPolicy: "14d"
  azureCredentials:
    secretName: cnpg-azure-backup-creds
    storageAccountKey: AZURE_STORAGE_ACCOUNT
    storageKeyKey: AZURE_STORAGE_KEY
  wal:
    compression: gzip
  data:
    compression: gzip
  scheduledBackup:
    name: postgres-daily-backup
    schedule: "0 0 2 * * *"
    backupOwnerReference: cluster
    target: prefer-standby
    immediate: true

pooler:
  enabled: true
  name: postgres-pgbouncer-rw
  instances: 2
  type: rw
  poolMode: transaction
  nodeSelector:
    kubernetes.azure.com/agentpool: user
  podLabels:
    app.kubernetes.io/component: pgbouncer
    app.kubernetes.io/name: postgres-pgbouncer-rw
  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname
    podAntiAffinityType: required
  deploymentStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  parameters:
    max_client_conn: "500"
    default_pool_size: "4"
    reserve_pool_size: "1"
    max_prepared_statements: "256"
